{% extends 'main/layout.html' %}

{% block title %}Products{% endblock %}

{% block content %}
<div class="features">
    <h1>Product Page</h1>
    
    {% for el in product %}
        <div class="aler-warning">
            <h3>{{ el.title }}</h3>
            <p>{{ el.description }}</p>
            {{ el.image }}
        </div>
    {% endfor %}
</div>
{% endblock %}
