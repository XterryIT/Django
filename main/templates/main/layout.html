{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/fb106575ce.js" crossorigin="anonymous"></script>
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
</head>
<body>
    <aside>
        <img src="{% static 'main/img/logo.png' %}" alt="">
        <span class="logo">Parfume</span>
        <h3>Navigation</h3>
        <ul>
            <a href=""><li><i class="fa-solid fa-house-chimney"></i>Main</li></a>
            <a href=""><li><i class="fa-solid fa-address-card"></i>About</li></a>
            <a href=""><li><i class="fa-solid fa-address-book"></i>Contact</li></a>
        </ul>
    </aside>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
